<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>BalanceBeat - Activity</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">

      <!-- Brand -->
      <a class="navbar-brand fw-bold" href="home.html">
        <i class="fa-solid fa-heart-pulse text-success"></i> BalanceBeat
      </a>

      <!-- Navigation Links -->
      <ul class="navbar-nav mx-auto">
        <li class="nav-item"><a class="nav-link" href="Home.html">Home</a></li>
        <li class="nav-item"><a class="nav-link active text-success" href="Activity.html">Activity</a></li>
        <li class="nav-item"><a class="nav-link" href="progress.html">Progress</a></li>
        <li class="nav-item"><a class="nav-link" href="Goals.html">Goals</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
      </ul>

      <!-- Sign In Button -->
      <button class="btn btn-success rounded-pill px-4">Sign In</button>

    </div>
  </nav>

  <!-- PAGE TITLE -->
  <div class="container mt-5">
    <h2 class="fw-bold">Daily Activity Log</h2>
  </div>

  <!-- ACTIVITY LOG -->
  <div class="container mt-4">
    <div class="card p-4 shadow-sm border-0">

      <div class="row">

        <!-- LEFT SIDE FORM -->
        <div class="col-md-6">
          <h4 class="mb-4">Log Your Activity</h4>

          <!-- Steps -->
          <div class="mb-3">
            <label class="form-label fw-semibold">
              <i class="fa-solid fa-shoe-prints text-success me-2"></i>
              Steps Taken
            </label>
            <input id="stepsInput" type="number" class="form-control" value="5000">
          </div>

          <!-- Calories -->
          <div class="mb-3">
            <label class="form-label fw-semibold">
              <i class="fa-solid fa-fire text-warning me-2"></i>
              Calories Burned
            </label>
            <input id="caloriesInput" type="number" class="form-control" value="200">
          </div>

          <!-- Exercise Time -->
          <div class="mb-4">
            <label class="form-label fw-semibold">
              <i class="fa-regular fa-clock text-primary me-2"></i>
              Exercise Time
            </label>
            <input id="timeInput" type="text" class="form-control" value="30 minutes">
          </div>

          <!-- Add Activity Button -->
          <button id="addActivityBtn" class="btn btn-success rounded-pill px-4 py-2">Add Activity</button>
        </div>

        <!-- RIGHT SIDE IMAGE -->
        <div class="col-md-6 text-center">
          <img src="https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b"
               class="img-fluid rounded shadow-sm" alt="Exercise Image">
        </div>

      </div>

      <hr class="my-4">

      <!-- ACTIVITY HISTORY -->
      <h5 class="mb-4">Activity History</h5>

      <div id="activityHistory" class="row g-4">

        <!-- Preloaded History Card 1 -->
        <div class="col-md-6">
          <div class="card history-card p-3 border-0 shadow-sm">
            <div class="d-flex justify-content-between">
              <div>
                <i class="fa-solid fa-shoe-prints text-success me-2"></i>
                Steps: <span class="text-success fw-bold">5000</span>
              </div>
              <span class="text-muted">Today</span>
            </div>
            <p class="mb-1 mt-2">Calories: 200</p>
            <p class="text-muted">Time: 30 min</p>
          </div>
        </div>

        <!-- Preloaded History Card 2 -->
        <div class="col-md-6">
          <div class="card history-card p-3 border-0 shadow-sm">
            <div class="d-flex justify-content-between">
              <div>
                <i class="fa-solid fa-fire text-warning me-2"></i>
                Steps: <span class="text-success fw-bold">7000</span>
              </div>
              <span class="text-muted">Yesterday</span>
            </div>
            <p class="mb-1 mt-2">Calories: 300</p>
            <p class="text-muted">Time: 45 min</p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom JS -->
  <script src="activity.js"></script>

</body>
</html>
