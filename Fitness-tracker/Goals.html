<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>BalanceBeat - Goals</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">

      <a class="navbar-brand fw-bold" href="home.html">
        <i class="fa-solid fa-heart-pulse text-success"></i> BalanceBeat
      </a>

      <ul class="navbar-nav mx-auto">
        <li class="nav-item">
          <a class="nav-link" href="home.html">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="activity.html">Activity</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="progress.html">Progress</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active text-success" href="goals.html">Goals</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="contact.html">Contact</a>
        </li>
      </ul>

      <button class="btn btn-success rounded-pill px-4">Sign In</button>

    </div>
  </nav>

  <!-- PAGE TITLE -->
  <div class="container mt-5">
    <h2 class="fw-bold">Set Your Fitness Goals</h2>
  </div>

  <!-- GOAL FORM -->
  <div class="container mt-4">
    <div class="card p-4">
      <div class="row align-items-center">

        <div class="col-md-6">
          <h5 class="mb-4">
            <i class="fa-solid fa-flag text-success"></i>
            Set Your Goals
          </h5>

          <label class="form-label">Daily Steps Goal</label>
          <input id="stepsGoal" type="number" class="form-control mb-3" value="8000">

          <label class="form-label">Weekly Calories Goal</label>
          <div class="input-group mb-4">
            <input id="caloriesGoal" type="number" class="form-control" value="1500">
            <span class="input-group-text">/week</span>
          </div>

          <button onclick="saveGoals()" class="btn btn-success rounded-pill px-4">
            Save Goals
          </button>
        </div>

        <div class="col-md-6 text-center">
          <img src="https://images.unsplash.com/photo-1583454110551-21f2fa2afe61"
               class="img-fluid rounded">
        </div>

      </div>
    </div>
  </div>

  <!-- CURRENT GOALS -->
  <div class="container mt-4">
    <h4 class="mb-3">Current Goals</h4>

    <div class="row g-4">

      <!-- Steps Card -->
      <div class="col-md-6">
        <div class="card p-4">
          <h5>
            <i class="fa-solid fa-shoe-prints text-success"></i>
            Steps Goal: <span id="displaySteps">8000</span>/day
          </h5>

          <div class="progress mt-3">
            <div id="stepsBar" class="progress-bar bg-success" style="width:70%"></div>
          </div>

          <p class="mt-2 text-muted">You're almost there!</p>
        </div>
      </div>

      <!-- Calories Card -->
      <div class="col-md-6">
        <div class="card p-4">
          <h5>
            <i class="fa-solid fa-fire text-warning"></i>
            Calories Goal: <span id="displayCalories">1500</span>/week
          </h5>

          <div class="progress mt-3">
            <div id="caloriesBar" class="progress-bar bg-warning" style="width:50%"></div>
          </div>

          <p class="mt-2 text-muted">Keep pushing!</p>
        </div>
      </div>

    </div>
  </div>

  <script src="goals.js"></script>

</body>
</html>
