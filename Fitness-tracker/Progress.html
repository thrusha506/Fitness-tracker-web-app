<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>BalanceBeat - Progress</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f0fff4, #e6f9ec, #d4f5dd);
      min-height: 100vh;
    }

    .card {
      border: none;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
    }

    .progress {
      height: 12px;
      border-radius: 10px;
    }

    .icon {
      font-size: 22px;
      margin-right: 8px;
    }
  </style>

</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">

      <!-- Brand -->
      <a class="navbar-brand fw-bold" href="home.html">
        <i class="fa-solid fa-heart-pulse text-success"></i> BalanceBeat
      </a>

      <!-- Navigation Links -->
      <ul class="navbar-nav mx-auto">
        <li class="nav-item">
          <a class="nav-link" href="home.html">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="activity.html">Activity</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active text-success" href="progress.html">Progress</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="Goals.html">Goals</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="contact.html">Contact</a>
        </li>
      </ul>

      <!-- Sign In Button -->
      <button class="btn btn-success rounded-pill px-4">Sign In</button>

    </div>
  </nav>

  <!-- PAGE TITLE -->
  <div class="container mt-5">
    <h2 class="fw-bold">Progress Overview</h2>
  </div>

  <!-- WEEKLY CHART -->
  <div class="container mt-4">
    <div class="card p-4">
      <h5 class="mb-4">Weekly Progress</h5>
      <canvas id="progressChart"></canvas>
    </div>
  </div>

  <!-- PROGRESS BARS -->
  <div class="container mt-4">
    <div class="row g-4">

      <!-- Steps Progress -->
      <div class="col-md-6">
        <div class="card p-4">

          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5>
              <i class="fa-solid fa-shoe-prints text-success icon"></i>
              Steps Progress
            </h5>
            <span class="text-muted">Today</span>
          </div>

          <div class="progress mb-3">
            <div class="progress-bar bg-success" style="width:70%"></div>
          </div>

          <div class="d-flex justify-content-between">
            <span class="text-muted">You're almost there!</span>
            <h4 class="text-success">70%</h4>
          </div>

        </div>
      </div>

      <!-- Calories Progress -->
      <div class="col-md-6">
        <div class="card p-4">

          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5>
              <i class="fa-solid fa-fire text-warning icon"></i>
              Calories Progress
            </h5>
            <span class="text-muted">Yesterday</span>
          </div>

          <div class="progress mb-3">
            <div class="progress-bar bg-warning" style="width:50%"></div>
          </div>

          <div class="d-flex justify-content-between">
            <span class="text-muted">Keep pushing!</span>
            <h4 class="text-warning">50%</h4>
          </div>

        </div>
      </div>

    </div>
  </div>

  <!-- External JavaScript file -->
  <script src="progress.js"></script>

</body>
</html>
